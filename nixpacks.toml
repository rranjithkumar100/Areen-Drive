[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.bcmath",
  "php84Extensions.gd",
  "php84Extensions.pcntl",
  "php84Extensions.zip",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.mysqli",
  "php84Extensions.mbstring",
  "php84Extensions.curl",
  "php84Extensions.fileinfo",
  "php84Extensions.intl",
  "nodejs_20"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-ftp"]

[phases.build]
cmds = ["npm ci", "npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"

[variables]
COMPOSER_ALLOW_SUPERUSER = "1"
